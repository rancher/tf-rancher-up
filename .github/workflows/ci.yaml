name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.8"

      - name: Rewrites all Terraform configuration files to a canonical format
        run: terraform fmt -diff -check -recursive

  generate_docs:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate documentation from Terraform modules
        run: |
          brew install terraform-docs
          terraform-docs --version
          ./scripts/generate_docs.sh

  detect_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Build baseline from origin/main
        run: |
          git fetch origin main
          git worktree add /tmp/main-checkout origin/main
          # Copy baseline config so detect-secrets uses consistent plugins/filters
          cp .secrets.baseline /tmp/main-checkout/
          cd /tmp/main-checkout
          detect-secrets scan \
            --exclude-files '\.terraform/.*' \
            --exclude-files '\.terraform\.lock\.hcl' \
            --exclude-files '\.secrets\.baseline' \
            . > /tmp/main-baseline.json
          rm -rf /tmp/main-checkout
          git worktree prune

      - name: Scan merge commit and compare
        run: |
          detect-secrets scan \
            --exclude-files '\.terraform/.*' \
            --exclude-files '\.terraform\.lock\.hcl' \
            --exclude-files '\.secrets\.baseline' \
            > /tmp/pr-scan.json
          python3 - <<'EOF'
          import json, sys

          with open('/tmp/pr-scan.json') as f:
              pr_scan = json.load(f)
          with open('/tmp/main-baseline.json') as f:
              main_baseline = json.load(f)

          # Hashes from origin/main's current code
          main_hashes = {
              s['hashed_secret']
              for secrets in main_baseline.get('results', {}).values()
              for s in secrets
          }

          # Hashes from the committed baseline — covers legacy reviewed findings
          # that main may have since diverged from, or the first-time setup
          try:
              with open('.secrets.baseline') as f:
                  committed = json.load(f)
              committed_hashes = {
                  s['hashed_secret']
                  for secrets in committed.get('results', {}).values()
                  for s in secrets
              }
          except (FileNotFoundError, json.JSONDecodeError):
              committed_hashes = set()

          # Union: known-safe set covers both current main + legacy reviewed state
          baseline_hashes = main_hashes | committed_hashes

          new_findings = []
          for path, secrets in pr_scan.get('results', {}).items():
              for s in secrets:
                  if s['hashed_secret'] not in baseline_hashes:
                      new_findings.append((path, s))

          if new_findings:
              print("UNREVIEWED SECRETS introduced by this PR:")
              for path, s in sorted(new_findings, key=lambda x: (x[0], x[1].get('line_number', 0))):
                  print(f"  {path}:{s['line_number']} [{s['type']}]")
              sys.exit(1)

          pr_total = sum(len(v) for v in pr_scan.get('results', {}).values())
          print(f"All {pr_total} finding(s) are in the baseline — OK")
          EOF

  check_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if the documents have been updated
        run: |
          git diff
          git status --porcelain --untracked-files=all
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then echo "Error changes detected ${CHANGES}"; exit 1; fi

