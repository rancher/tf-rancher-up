name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup node
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.8"

      - name: Rewrites all Terraform configuration files to a canonical format
        run: terraform fmt -diff -check -recursive

  generate_docs:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate documentation from Terraform modules
        run: |
          brew install terraform-docs
          terraform-docs --version
          ./scripts/generate_docs.sh

  detect_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.terraform/.*' \
            --exclude-files '\.terraform\.lock\.hcl' \
            > /tmp/secrets-scan.json
          # Fail if any finding in the new scan is absent from the committed baseline
          python3 - <<'EOF'
          import json, sys
          with open('/tmp/secrets-scan.json') as f:
              new = json.load(f)
          with open('.secrets.baseline') as f:
              baseline = json.load(f)
          baseline_hashes = {
              h
              for secrets in baseline.get('results', {}).values()
              for h in [s['hashed_secret'] for s in secrets]
          }
          new_findings = [
              (path, s)
              for path, secrets in new.get('results', {}).items()
              for s in secrets
              if s['hashed_secret'] not in baseline_hashes
          ]
          if new_findings:
              for path, s in new_findings:
                  print(f"UNREVIEWED SECRET: {path}:{s['line_number']} [{s['type']}]")
              sys.exit(1)
          print(f"All {sum(len(v) for v in new.get('results',{}).values())} finding(s) are in the baseline — OK")
          EOF

  check_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check if the documents have been updated
        run: |
          git diff
          git status --porcelain --untracked-files=all
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then echo "Error changes detected ${CHANGES}"; exit 1; fi

